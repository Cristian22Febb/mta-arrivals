<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Crash Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: #3d3d3d;
            border-color: #666;
        }

        button:active {
            transform: scale(0.98);
        }

        .refresh-btn {
            background: #0066cc;
            border-color: #0066cc;
        }

        .refresh-btn:hover {
            background: #0052a3;
        }

        .clear-btn {
            background: #dc3545;
            border-color: #dc3545;
        }

        .clear-btn:hover {
            background: #c82333;
        }

        .logs-container {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            min-height: 400px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .error-text {
            color: #ff6b6b;
        }

        .success-text {
            color: #51cf66;
        }

        .warning-text {
            color: #ffd43b;
        }

        .timestamp {
            color: #74c0fc;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 60px 20px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #2d2d2d;
            padding: 15px 20px;
            border-radius: 6px;
            border: 1px solid #444;
            flex: 1;
            min-width: 200px;
        }

        .stat-label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            color: #e0e0e0;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats {
                flex-direction: column;
            }

            .stat-card {
                min-width: 100%;
            }
        }

        /* Highlight crash entries */
        .crash-entry {
            background: rgba(220, 53, 69, 0.1);
            border-left: 3px solid #dc3545;
            padding-left: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ ESP32 Crash Logs</h1>
        <p class="subtitle">Real-time crash and error monitoring</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Crashes</div>
                <div class="stat-value" id="crashCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" id="lastUpdated" style="font-size: 1em;">Never</div>
            </div>
        </div>

        <div class="controls">
            <button class="refresh-btn" onclick="loadLogs()">🔄 Refresh</button>
            <button class="clear-btn" onclick="clearLogs()">🗑️ Clear All Logs</button>
            <button onclick="downloadLogs()">💾 Download</button>
            <button onclick="toggleAutoRefresh()">⏱️ <span id="autoRefreshText">Auto-Refresh: OFF</span></button>
        </div>

        <div class="logs-container" id="logsContainer">
            <div class="loading">Loading crash logs...</div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let autoRefreshEnabled = false;

        async function loadLogs() {
            const container = document.getElementById('logsContainer');
            
            try {
                const response = await fetch('/api/crash-logs');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.logs || data.logs.trim() === '') {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <h3>No crashes recorded</h3>
                            <p>Your ESP32 is running smoothly!</p>
                        </div>
                    `;
                    document.getElementById('crashCount').textContent = '0';
                } else {
                    // Count crash entries
                    const crashCount = (data.logs.match(/========== CRASH LOG ==========/g) || []).length;
                    document.getElementById('crashCount').textContent = crashCount;
                    
                    // Format and highlight the logs
                    let formattedLogs = data.logs
                        .replace(/========== CRASH LOG ==========[\s\S]*?================================/g, 
                            match => `<div class="crash-entry">${match}</div>`)
                        .replace(/\[(.*?)\]/g, '<span class="timestamp">[$1]</span>')
                        .replace(/ERROR:/g, '<span class="error-text">ERROR:</span>')
                        .replace(/WARNING:/g, '<span class="warning-text">WARNING:</span>')
                        .replace(/Reset Reason: (.*)/g, '<span class="error-text">Reset Reason: $1</span>');
                    
                    container.innerHTML = `<pre>${formattedLogs}</pre>`;
                }

                // Update last updated time
                const now = new Date();
                document.getElementById('lastUpdated').textContent = now.toLocaleTimeString();

            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state error-text">
                        <h3>⚠️ Failed to load crash logs</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                console.error('Error loading logs:', error);
            }
        }

        async function clearLogs() {
            if (!confirm('Are you sure you want to clear all crash logs?')) {
                return;
            }

            try {
                const response = await fetch('/api/crash-logs', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✓ Crash logs cleared successfully');
                    loadLogs();
                } else {
                    throw new Error('Failed to clear logs');
                }
            } catch (error) {
                alert('✗ Error: ' + error.message);
                console.error('Error clearing logs:', error);
            }
        }

        function downloadLogs() {
            const logs = document.querySelector('#logsContainer pre')?.textContent || '';
            if (!logs) {
                alert('No logs to download');
                return;
            }

            const blob = new Blob([logs], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `esp32-crash-logs-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const text = document.getElementById('autoRefreshText');
            
            if (autoRefreshEnabled) {
                text.textContent = 'Auto-Refresh: ON (30s)';
                autoRefreshInterval = setInterval(loadLogs, 30000);
            } else {
                text.textContent = 'Auto-Refresh: OFF';
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }

        // Load logs on page load
        loadLogs();
    </script>
</body>
</html>
