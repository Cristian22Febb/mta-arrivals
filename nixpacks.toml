[phases.setup]
nixPkgs = ["nodejs-18_x", "python311", "python311Packages.pip", "python311Packages.virtualenv"]
nixLibs = ["stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "npm install",
  "python -m venv /tmp/venv",
  "/tmp/venv/bin/pip install -r proxy/requirements.txt"
]

[start]
cmd = "bash start.sh"
